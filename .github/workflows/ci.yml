name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  ci:
    uses: bluebossa63/niceneasy-ci/.github/workflows/node-ci.yml@main
    with:
      node-version: "24"
      precheck-command: "npm run check:generated"
      build-command: "npm run build"
      test-command: "npm run coverage"

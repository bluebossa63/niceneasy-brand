# SonarQube scanner configuration for niceneasy-brand.
# Consumed by the k3s-native js-scanner CronJob in the fsi-ai-agent repo
# (infrastructure/k8s/js-scanner-job.yaml). sonar.host.url and sonar.token are
# supplied at scan time (SONAR_HOST_URL / SONAR_TOKEN).
sonar.projectKey=niceneasy-brand
sonar.projectName=niceneasy Brand
sonar.sources=.
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.mjs
sonar.exclusions=tests/**,**/node_modules/**,assets/**,docs/**,examples/**,coverage/**
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8
